services:
  mysql:
    image: mysql:9.7
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./init:/docker-entrypoint-initdb.d:ro
    ports:
      # Sintaxe longa (com "target") é a recomendada pelo Compose Spec quando
      # há override em compose.dev.yml: assim o merge substitui a entrada pelo
      # "target" em vez de concatenar as duas — evita "port already in use"
      # ao publicar a mesma porta do container duas vezes.
      # Bind apenas em loopback: acesso remoto só via túnel SSH (ver README).
      - target: 3306
        published: "3306"
        host_ip: 127.0.0.1
        protocol: tcp
    networks:
      - infra
    logging:
      # Error log vai para stderr (docker logs mysql); rotação por tamanho,
      # sem depender de logrotate/permissões no host.
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          # Ajuste conforme a RAM do servidor.
          # Regra: innodb_buffer_pool_size + ~256M de overhead de conexões/buffers
          memory: 2G
          cpus: "2"

networks:
  infra:
    external: true
