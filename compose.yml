services:
  mysql:
    image: mysql:9.7
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./scripts:/scripts:ro
      - mysql_logs:/var/log/mysql
    expose:
      - "3306"
    networks:
      - infra
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          # Ajuste conforme a RAM do servidor.
          # Regra: innodb_buffer_pool_size + ~256M de overhead de conexões/buffers
          memory: 512M
          cpus: "2"

volumes:
  mysql_data:
  mysql_logs:

networks:
  infra:
    external: true
